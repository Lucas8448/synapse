services:
  synapse:
    image: ghcr.io/berriai/litellm:v1.83.14-stable
    container_name: synapse
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?run ./up.sh}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?run ./up.sh}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - cortex

networks:
  cortex:
    external: true
