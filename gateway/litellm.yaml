# synapse gateway — single source of truth for model routing.
# Tools use tier aliases (frontier/mid/bulk/local), never real model names.
# Swap a provider by editing ONE litellm_params block.

model_list:
  # ── frontier: hard reasoning, architecture, gnarly debugging. Burns paid credit.
  - model_name: frontier
    litellm_params:
      model: openrouter/z-ai/glm-5.2
      api_key: os.environ/OPENROUTER_API_KEY

  # ── mid: everyday coding, refactors, tests.
  - model_name: mid
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY

  # ── bulk: subagent fanout, classification, summarization. Free.
  - model_name: bulk
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: os.environ/OPENROUTER_API_KEY

  # ── low: trivial tasks — commit messages, renames, quick lookups. Free.
  - model_name: low
    litellm_params:
      model: openrouter/cohere/north-mini-code:free
      api_key: os.environ/OPENROUTER_API_KEY

  # ── local: offline fallback. Zero cost, zero network.
  # TODO(container): inside Docker, localhost:11434 is the CONTAINER's own loopback,
  # not the Ollama host — so this tier is unreachable from the VPS container. Point
  # api_base at the Ollama box's Tailscale hostname once the tailnet name is chosen
  # (e.g. http://<tailnet-host>:11434). litellm connects to providers lazily, so an
  # unreachable local only errors if the fallback chain reaches `local`; it does not
  # block gateway startup.
  - model_name: local
    litellm_params:
      model: ollama/qwen3.6:35b-a3b
      api_base: http://localhost:11434

router_settings:
  fallbacks:
    - frontier: ["mid"] # credit exhausted → degrade gracefully
    - mid: ["bulk"]
    - bulk: ["low"]
    - low: ["local"] # OpenRouter down/rate-limited → offline
  num_retries: 2
  timeout: 120

litellm_settings:
  cache: true # local response cache — repeated calls are free
  cache_params:
    type: local
  drop_params: true # silently drop provider-unsupported params instead of erroring
  callbacks: ["mcp_autoinject.mcp_tools_autoinject"] # auto-attach the curated MCP toolbox to every chat/responses call

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY # gateway auth — any non-empty secret
  max_budget: 20 # hard monthly ceiling, USD
  budget_duration: 30d

# ── MCP: a unified tool hub exposed THROUGH the gateway. Each server is reachable
# at  http://localhost:4000/<name>/mcp  (native MCP clients) and from
# /v1/chat/completions by sending a tools block:
#   {"type":"mcp","server_url":"litellm_proxy/mcp/<name>","server_label":"<name>","require_approval":"never"}
# gateway/mcp_autoinject.py auto-attaches a curated subset to every request so
# apps need zero MCP setup (memory + web everywhere; read-only files/git/github
# on capable tiers; lower-tier subagents via the `agents` server). Keep every
# server key single-word and alias-free: litellm derives the tool-name prefix
# from an alias but maps tools back by server name, so an alias would break
# server-side auto-execution (Unknown tool: <name>_*).
# NOTE: 'websearch' must NOT be named 'search' — /search/mcp collides with
# litellm's built-in /search endpoint.
mcp_servers:
  synapse:
    transport: stdio
    command: "./.venv/bin/python" # venv python (has fastmcp+numpy); basename passes the stdio allowlist
    args: ["memory/server.py"] # resolved from repo root — spine-sync cd's there before launch
    env: # litellm hands this env to the subprocess AS-IS, so pass through everything it needs
      SYNAPSE_VAULT: os.environ/SYNAPSE_VAULT # index your real Obsidian vault, not the default store/
      HOME: os.environ/HOME # server writes its embedding cache under ~/.cache/synapse
      PATH: os.environ/PATH
    allow_all_keys: true # no DB in this deployment — let the master key reach it

  # ── fetch: pull a URL down to markdown. No key, read-only.
  fetch:
    transport: stdio
    command: uvx
    args: ["mcp-server-fetch"]
    env: {PATH: os.environ/PATH, HOME: os.environ/HOME}
    allow_all_keys: true

  # ── websearch: DuckDuckGo search + page fetch. No key. (Name avoids /search.)
  websearch:
    transport: stdio
    command: uvx
    args: ["duckduckgo-mcp-server"]
    env: {PATH: os.environ/PATH, HOME: os.environ/HOME}
    allow_all_keys: true

  # ── files: local filesystem. Rooted at $SYNAPSE_FILES_ROOT (default: repo dir).
  # os.environ/ is NOT resolved inside args-list strings, so a python3 shim (an
  # allowlisted command) reads the root from the resolved env and execs the server.
  files:
    transport: stdio
    command: python3
    args:
      - "-c"
      - "import os; os.execvp('npx', ['npx','-y','@modelcontextprotocol/server-filesystem', os.environ.get('SYNAPSE_FILES_ROOT') or os.getcwd()])"
    env:
      PATH: os.environ/PATH
      HOME: os.environ/HOME
      SYNAPSE_FILES_ROOT: os.environ/SYNAPSE_FILES_ROOT
    allow_all_keys: true

  # ── git: read/inspect any git repo (tools take a repo_path per call).
  git:
    transport: stdio
    command: uvx
    args: ["mcp-server-git"]
    env: {PATH: os.environ/PATH, HOME: os.environ/HOME}
    allow_all_keys: true

  # ── github: GitHub's remote MCP. auth_type MUST be 'authorization' — litellm's
  # 'bearer_token' path sends a redacted '******', so the token value itself
  # carries the 'Bearer ' prefix (set from `gh auth token` by the plist/spine-sync).
  github:
    transport: http
    url: "https://api.githubcopilot.com/mcp/"
    auth_type: authorization
    authentication_token: os.environ/GITHUB_MCP_TOKEN
    allow_all_keys: true

  # ── agents: delegation hierarchy. Exposes to_mid/to_bulk/to_low/to_local tools
  # that spin up a subagent on that tier by calling THIS gateway back (needs the
  # master key + port). mcp_autoinject.py hands each caller only the tools for
  # tiers below it, so any model can offload work to cheaper subagents. Local
  # ./venv python (same interpreter as synapse); basename passes the allowlist.
  agents:
    transport: stdio
    command: "./.venv/bin/python"
    args: ["agents/server.py"] # resolved from repo root — launcher cd's there first
    env:
      SYNAPSE_MASTER_KEY: os.environ/SYNAPSE_MASTER_KEY # gateway auth key (copy of LITELLM_MASTER_KEY; separate name dodges litellm's master-key special-casing and never resolves to None)
      SYNAPSE_PORT: os.environ/SYNAPSE_PORT # which port the gateway listens on (exported by the launcher)
      PATH: os.environ/PATH
      HOME: os.environ/HOME
    allow_all_keys: true
